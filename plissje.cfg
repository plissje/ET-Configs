// ==========================================
// ET LEGACY - Plissje CONFIG
// ==========================================

// --- Console Access ---
seta com_allowConsole "1"
bind ~ "toggleconsole"
bind ` "toggleconsole"

// --- Memory & Engine ---
seta com_hunkMegs "512"
seta com_zoneMegs "64"
seta com_soundMegs "64"
seta r_threadedoptimization "1"

// --- Frame Rate (Optimized for 140Hz + id Tech 3 Physics) ---
seta com_maxfps "500"

// --- Maximum Visual Sharpness ---
seta r_picmip "0"                           
seta r_ext_multisample "4"                  
seta r_ext_texture_filter_anisotropic "1"   
seta r_ext_max_anisotropy "16"              
seta r_textureMode "GL_LINEAR_MIPMAP_LINEAR" 
seta r_ext_compressed_textures "0"          
seta r_lodbias "0"                          
seta r_detailtextures "1"                   
seta r_colorbits "32"
seta r_texturebits "32"
seta r_depthbits "24"
seta r_dynamiclight "1"                     
seta r_fastsky "0"                          

// --- Absolute Stillness (Zero Camera Bob) ---
seta cg_bobup "0"
seta cg_bobpitch "0"
seta cg_bobroll "0"
seta cg_bobyaw "0"
seta cg_runpitch "0"
seta cg_runroll "0"

// --- Visual De-Clutter (No Junk/Blood) ---
seta cg_blood "0"
seta cg_showblood "0"
seta cg_bloodFlash "0"
seta cg_bloodDamageBlend "0"
seta cg_gibs "0"                            
seta cg_wolfparticles "0"                   
seta cg_atmosphericEffects "0"              
seta cg_muzzleFlash "0"                     
seta cg_shadows "0"                         
seta cg_descriptiveText "0"                 

// --- Mouse (Raw Input) ---
seta m_filter "0"
seta cl_mouseAccel "0"
seta sensitivity "0.9"                      
seta m_pitch "0.022"
seta m_yaw "0.022"

// --- UI & Field of View ---
seta cg_fov "110"                           
seta cg_drawGun "1"
seta cg_gunfovoffset "5"                    
seta cg_drawfps "1"
seta cg_lagometer "1"
seta cg_drawReinforcementTime "1"           

// --- Crosshair (Clean Dot) ---
seta cg_drawCrosshair "5"                   
seta cg_crosshairSize "32"
seta cg_crosshairColor "cyan"
seta cg_crosshairAlpha "1.0"
seta cg_crosshairPulse "0"                  

// --- Network Optimization ---
seta rate "45000"
seta cl_maxpackets "125"
seta cl_packetdup "1"
seta snaps "50"

// ==========================================
// CORE BINDS (Movement & Combat)
// ==========================================
bind w "+forward"
bind s "+back"
bind a "+moveleft"
bind d "+moveright"
bind SPACE "+moveup"        // Jump
bind c "+movedown"          // Crouch
bind x "+prone"             // Prone
bind SHIFT "+sprint"        // Sprint
bind CAPSLOCK "+speed"      // Walk

bind MOUSE1 "+attack"
bind MOUSE2 "weapalt"       // Alt-fire / Sniper Scope / MG42 deploy
bind r "+reload"
bind f "+activate"          // Use / Open doors / Revive
bind q "+leanleft"
bind e "+leanright"
bind b "+zoom"              // Binoculars
bind v "mp_quickmessage"    // Voice menu (V-5-4 "Medic!")
bind t "messagemode"        // Global Chat
bind y "messagemode2"       // Team Chat
bind u "messagemode3"       // Fireteam Chat
bind TAB "+scores"
bind m "openlimbomenu"      // Open map/class menu

// --- Weapons ---
bind 1 "weaponbank 1"       // Knife
bind 2 "weaponbank 2"       // Pistol
bind 3 "weaponbank 3"       // SMG / Rifle
bind 4 "weaponbank 4"       // Grenade
bind 5 "weaponbank 5"       // Syringe / Pliers / Airstrike
bind 6 "weaponbank 6"       // Medpack / Ammo / Satchel
bind MWHEELUP "weapnext"
bind MWHEELDOWN "weapprev"

// ==========================================
// QUICK CLASS BINDS (Press F1-F6 to instantly swap classes)
// ==========================================
bind F1 "class m 1; echo ^2Spawn: ^7Medic ^2(^7SMG^2)"
bind F2 "class e 1; echo ^2Spawn: ^7Engineer ^2(^7SMG^2)"
bind F3 "class e 2; echo ^2Spawn: ^7Engineer ^2(^7Rifle^2)"
bind F4 "class f 1; echo ^2Spawn: ^7Field Ops ^2(^7SMG^2)"
bind F5 "class c 3; echo ^2Spawn: ^7Covert Ops ^2(^7Sniper^2)"
bind F6 "class s 4; echo ^2Spawn: ^7Soldier ^2(^7Panzer^2)"

echo ">>> FULL CONFIG LOADED SUCCESSFULLY <<<"
bind CTRL "+movedown"
